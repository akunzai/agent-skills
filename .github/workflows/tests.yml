name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run actionlint
        run: mise run lint-actions

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run ShellCheck
        run: mise run lint-shell

  agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run agents-md name checks
        run: bash tests/agents-md-name.sh

      - name: Run agents-md content checks
        run: bash tests/agents-md-content.sh

  git-sync-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run git-sync-memory integration tests
        run: bash tests/git-sync-memory-integration.sh

      - name: Run git-sync-memory branch derivation tests
        run: bash tests/git-sync-memory-branch.sh

      - name: Run memory content checks
        run: bash tests/memory-content.sh

  tidy-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run tidy-commits content checks
        run: bash tests/tidy-commits-content.sh

  mise:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run mise content checks
        run: bash tests/mise-content.sh

  aube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run aube content checks
        run: bash tests/aube-content.sh

  mem-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run mem-setup content checks
        run: bash tests/mem-setup-content.sh

      - name: Run mem-setup bridge checks
        run: bash tests/mem-setup-bridge.sh

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run Windows POSIX path-guard tests
        run: bash tests/windows-path-guard.sh

      - name: Run git-sync-memory integration tests
        run: bash tests/git-sync-memory-integration.sh

      - name: Run git-sync-memory branch derivation tests
        run: bash tests/git-sync-memory-branch.sh

      - name: Run mem-setup bridge checks
        run: bash tests/mem-setup-bridge.sh
