name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: |
          find tests skills -name "*.sh" -type f -exec shellcheck {} +

  agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run agents-md name checks
        run: bash tests/agents-md-name.sh

      - name: Run agents-md content checks
        run: bash tests/agents-md-content.sh

  git-sync-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run git-sync-memory integration tests
        run: bash tests/git-sync-memory-integration.sh

      - name: Run git-sync-memory branch derivation tests
        run: bash tests/git-sync-memory-branch.sh

      - name: Run memory content checks
        run: bash tests/memory-content.sh

  tidy-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run tidy-commits content checks
        run: bash tests/tidy-commits-content.sh

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Windows POSIX path-guard tests
        run: bash tests/windows-path-guard.sh

      - name: Run git-sync-memory integration tests
        run: bash tests/git-sync-memory-integration.sh

      - name: Run git-sync-memory branch derivation tests
        run: bash tests/git-sync-memory-branch.sh
