name: Test tidy-commits

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-tidy-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run tidy-commits content checks
        run: bash tests/tidy-commits-content.sh
