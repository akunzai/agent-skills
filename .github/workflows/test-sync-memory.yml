name: Test sync-memory

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-sync-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run sync-memory integration tests
        run: bash tests/sync-memory-integration.sh
